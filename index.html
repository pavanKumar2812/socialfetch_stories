<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialFetch</title>
  <meta name="description" content="SocialFetch - Modern mobile-first content feed" />

  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-soft: #f2f4f8;
      --text: #1a1d29;
      --text-muted: #5f6678;
      --line: #e7eaf1;
      --brand: #1f6fff;
      --brand-soft: #e7efff;
      --shadow-sm: 0 8px 20px rgba(17, 24, 39, 0.06);
      --shadow-md: 0 16px 32px rgba(17, 24, 39, 0.1);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --max-width: 700px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Avenir Next", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 500px at -8% -12%, #e9f2ff 0%, transparent 45%),
        radial-gradient(900px 500px at 108% 0%, #f0f4ff 0%, transparent 40%),
        var(--bg);
    }

    .app {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 14px 28px;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(246, 247, 251, 0.8);
      border-bottom: 1px solid rgba(231, 234, 241, 0.9);
    }

    .navbar-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.18rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo b {
      color: var(--brand);
      font-weight: 800;
    }

    .feed {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeSlideIn 0.55s ease forwards;
    }

    .card-image-wrap {
      aspect-ratio: 16 / 9;
      background: #dfe5ef;
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .card:hover .card-image {
      transform: scale(1.03);
    }

    .card-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: var(--brand-soft);
      color: var(--brand);
    }

    .timestamp {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .title {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .excerpt {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .control-btn {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 72px;
    }

    .control-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #d7dce8;
      background: #ebeff7;
    }

    .control-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .play-btn {
      background: #edf3ff;
      border-color: #dce7ff;
      color: #175ce6;
    }

    .card.is-playing .play-btn {
      background: #1f6fff;
      border-color: #1f6fff;
      color: #ffffff;
    }

    .speech-content {
      margin-top: 2px;
      padding: 0 12px;
      max-height: 0;
      overflow: hidden;
      border-radius: var(--radius-md);
      background: #fbfcff;
      border: 1px solid transparent;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.28s ease, padding 0.35s ease, border-color 0.3s ease;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text-muted);
      scroll-behavior: smooth;
    }

    .card.is-speaking .speech-content {
      max-height: 210px;
      overflow-y: auto;
      opacity: 1;
      padding: 12px;
      border-color: #e8ecf5;
    }

    .sentence {
      border-radius: 6px;
      transition: background-color 0.24s ease, color 0.24s ease;
      padding: 0 2px;
    }

    .sentence.active {
      background: #fff1a8;
      color: #2f2a16;
    }

    .state {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 26px 18px;
      text-align: center;
      color: var(--text-muted);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeSlideIn 0.45s ease forwards;
    }

    .state h3 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 1.05rem;
    }

    .state p {
      margin: 0;
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .skeleton {
      pointer-events: none;
      overflow: hidden;
    }

    .skel-line,
    .skel-image,
    .skel-pill,
    .skel-btn {
      position: relative;
      background: linear-gradient(90deg, #eef1f7 0%, #f7f9fd 50%, #eef1f7 100%);
      background-size: 220% 100%;
      animation: shimmer 1.25s infinite linear;
      border-radius: 10px;
    }

    .skel-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 0;
    }

    .skel-line { height: 12px; }
    .skel-line.lg { height: 16px; width: 88%; }
    .skel-line.md { width: 68%; }
    .skel-line.sm { width: 54%; }
    .skel-pill { width: 90px; height: 26px; border-radius: 999px; }
    .skel-btn { width: 100px; height: 36px; border-radius: 999px; margin-left: auto; }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    @keyframes fadeSlideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 720px) {
      .app { padding: 0 0 30px; }
      .navbar-inner { padding-inline: 0; }
      .card-body { padding: 18px; }
      .title { font-size: 1.3rem; }
      .excerpt { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <div class="logo">Social<b>Fetch</b></div>
    </div>
  </header>

  <main class="app">
    <section id="feed" class="feed" aria-live="polite"></section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCvHUkN-oHsy6TNnXxgL-PzbqeDTk4NBVg",
      authDomain: "portfoliopavan-a79ea.firebaseapp.com",
      projectId: "portfoliopavan-a79ea",
      storageBucket: "portfoliopavan-a79ea.firebasestorage.app",
      messagingSenderId: "846941948950",
      appId: "1:846941948950:web:f99f130ac2785fbba07937"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const $feed = $("#feed");

    function escapeHtml(value = "") {
      return value
        .toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function splitIntoSentences(text = "") {
      const normalized = text.replace(/\\s+/g, " ").trim();
      if (!normalized) return [];
      const matches = normalized.match(/[^.!?]+[.!?]+|[^.!?]+$/g);
      const sentences = matches ? matches.map((part) => part.trim()).filter(Boolean) : [normalized];
      return sentences.length ? sentences : [normalized];
    }

    function formatTimestamp(createdAt) {
      if (!createdAt) return "Just now";
      const date = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);
      if (Number.isNaN(date.getTime())) return "Just now";
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function createSkeletonCard() {
      return `
        <article class="card skeleton" aria-hidden="true">
          <div class="skel-image"></div>
          <div class="card-body">
            <div class="meta-row">
              <div class="skel-pill"></div>
              <div class="skel-line sm"></div>
            </div>
            <div class="skel-line lg"></div>
            <div class="skel-line md"></div>
            <div class="skel-line"></div>
            <div class="skel-btn"></div>
          </div>
        </article>
      `;
    }

    function renderSkeletons(count = 4) {
      const skeletons = Array.from({ length: count }, () => createSkeletonCard()).join("");
      $feed.html(skeletons);
    }

    function renderEmptyState() {
      $feed.html(`
        <article class="state" role="status">
          <h3>No posts yet</h3>
          <p>When new content is published to Firestore, it will appear here.</p>
        </article>
      `);
    }

    function renderErrorState() {
      $feed.html(`
        <article class="state" role="alert">
          <h3>Unable to load posts</h3>
          <p>Please check your Firebase config and Firestore rules, then refresh.</p>
        </article>
      `);
    }

    const postsById = new Map();
    const supportsSpeech = "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    const playback = {
      postId: null,
      index: 0,
      sentences: [],
      utterance: null,
      isPaused: false
    };

    function getCardByPostId(postId) {
      return $feed.find(`.card[data-post-id="${postId}"]`);
    }

    function scrollSentenceIntoView($card, sentenceIndex) {
      const $container = $card.find(".speech-content");
      const $sentence = $container.find(`.sentence[data-idx="${sentenceIndex}"]`);
      if (!$container.length || !$sentence.length) return;

      $container.find(".sentence").removeClass("active");
      $sentence.addClass("active");

      const container = $container.get(0);
      const sentence = $sentence.get(0);

      const sentenceTop = sentence.offsetTop;
      const sentenceBottom = sentenceTop + sentence.offsetHeight;
      const viewTop = container.scrollTop;
      const viewBottom = viewTop + container.clientHeight;

      if (sentenceTop < viewTop || sentenceBottom > viewBottom) {
        $container.stop(true).animate(
          { scrollTop: Math.max(sentenceTop - 20, 0) },
          220
        );
      }

      sentence.scrollIntoView({ behavior: "smooth", block: "nearest" });
      $card.get(0).scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function resetCardAudioUI($card) {
      if (!$card || !$card.length) return;
      $card.removeClass("is-speaking is-playing is-paused");
      $card.find(".sentence").removeClass("active");
      $card.find(".pause-btn, .stop-btn").prop("disabled", true);
      $card.find(".play-btn").prop("disabled", !supportsSpeech).text("▶ Play");
    }

    function resetPlaybackState() {
      playback.postId = null;
      playback.index = 0;
      playback.sentences = [];
      playback.utterance = null;
      playback.isPaused = false;
    }

    function stopPlayback() {
      if (supportsSpeech) {
        window.speechSynthesis.cancel();
      }

      if (playback.postId) {
        const $activeCard = getCardByPostId(playback.postId);
        resetCardAudioUI($activeCard);
      }

      resetPlaybackState();
    }

    function setCardAsActive(postId, isPaused = false) {
      const $card = getCardByPostId(postId);
      if (!$card.length) return;
      $card.addClass("is-speaking");
      $card.toggleClass("is-playing", !isPaused);
      $card.toggleClass("is-paused", isPaused);
      $card.find(".play-btn").text(isPaused ? "▶ Resume" : "▶ Restart");
      $card.find(".pause-btn").prop("disabled", isPaused);
      $card.find(".stop-btn").prop("disabled", false);
    }

    function speakCurrentSentence(postId) {
      if (playback.postId !== postId) return;

      if (playback.index >= playback.sentences.length) {
        stopPlayback();
        return;
      }

      const sentence = playback.sentences[playback.index];
      const utterance = new SpeechSynthesisUtterance(sentence);
      playback.utterance = utterance;

      const $card = getCardByPostId(postId);
      setCardAsActive(postId, false);
      scrollSentenceIntoView($card, playback.index);

      utterance.onend = () => {
        if (playback.postId !== postId || playback.isPaused) return;
        playback.index += 1;
        speakCurrentSentence(postId);
      };

      utterance.onerror = () => {
        if (playback.postId !== postId) return;
        playback.index += 1;
        speakCurrentSentence(postId);
      };

      window.speechSynthesis.speak(utterance);
    }

    function startPlayback(postId) {
      if (!supportsSpeech) return;

      const post = postsById.get(postId);
      if (!post) return;

      const fullText = (post.content || "").replace(/\\s+/g, " ").trim();
      if (!fullText) return;

      const sentences = splitIntoSentences(fullText);
      if (!sentences.length) return;

      stopPlayback();

      playback.postId = postId;
      playback.index = 0;
      playback.sentences = sentences;
      playback.isPaused = false;

      speakCurrentSentence(postId);
    }

    function pausePlayback(postId) {
      if (!supportsSpeech) return;
      if (playback.postId !== postId || playback.isPaused) return;

      window.speechSynthesis.pause();
      playback.isPaused = true;

      const $card = getCardByPostId(postId);
      setCardAsActive(postId, true);
    }

    function resumePlayback(postId) {
      if (!supportsSpeech) return;
      if (playback.postId !== postId || !playback.isPaused) return;

      window.speechSynthesis.resume();
      playback.isPaused = false;

      const $card = getCardByPostId(postId);
      setCardAsActive(postId, false);
    }

    function renderPosts(posts) {
      postsById.clear();
      const html = posts.map((post, index) => {
        const postId = escapeHtml(post.id || `post-${index}`);
        const title = escapeHtml(post.title || "Untitled Post");
        const rawContent = (post.content || "No content available.").trim();
        const content = escapeHtml(rawContent);
        const excerptText = rawContent.length > 170 ? `${rawContent.slice(0, 170)}...` : rawContent;
        const excerpt = escapeHtml(excerptText);
        const type = escapeHtml(post.type || "General");
        const timestamp = formatTimestamp(post.created_at);
        const imageUrl = post.image_url
          ? escapeHtml(post.image_url)
          : "https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=1200&q=80";
        const sentenceSpans = splitIntoSentences(rawContent)
          .map((sentence, sentenceIndex) => `<span class="sentence" data-idx="${sentenceIndex}">${escapeHtml(sentence)} </span>`)
          .join("");

        postsById.set(post.id, {
          ...post,
          content: rawContent
        });

        return `
          <article class="card" data-post-id="${postId}" style="animation-delay:${Math.min(index * 0.05, 0.35)}s">
            <div class="card-image-wrap">
              <img class="card-image" src="${imageUrl}" alt="${title}" loading="lazy" />
            </div>
            <div class="card-body">
              <div class="meta-row">
                <span class="badge">${type}</span>
                <span class="timestamp">${timestamp}</span>
              </div>
              <h2 class="title">${title}</h2>
              <p class="excerpt">${excerpt}</p>
              <div class="speech-content" aria-live="polite">${sentenceSpans || content}</div>
              <div class="actions">
                <button class="control-btn play-btn" type="button" aria-label="Play audio for ${title}" ${supportsSpeech ? "" : "disabled"}>
                  ${supportsSpeech ? "▶ Play" : "Speech Unavailable"}
                </button>
                <button class="control-btn pause-btn" type="button" aria-label="Pause audio for ${title}" disabled>⏸ Pause</button>
                <button class="control-btn stop-btn" type="button" aria-label="Stop audio for ${title}" disabled>⏹ Stop</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      $feed.html(html);
    }

    async function loadPosts() {
      stopPlayback();
      renderSkeletons(4);

      try {
        const postsRef = collection(db, "posts");
        const postsQuery = query(postsRef, orderBy("created_at", "desc"));
        const snap = await getDocs(postsQuery);

        if (snap.empty) {
          renderEmptyState();
          return;
        }

        const posts = snap.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
        renderPosts(posts);
      } catch (error) {
        console.error("Failed to fetch posts:", error);
        renderErrorState();
      }
    }

    $feed.on("click", ".play-btn", function () {
      const $card = $(this).closest(".card");
      const postId = $card.data("post-id");
      if (!postId) return;

      if (playback.postId === postId && playback.isPaused) {
        resumePlayback(postId);
        return;
      }

      startPlayback(postId);
    });

    $feed.on("click", ".pause-btn", function () {
      const $card = $(this).closest(".card");
      const postId = $card.data("post-id");
      if (!postId) return;
      pausePlayback(postId);
    });

    $feed.on("click", ".stop-btn", function () {
      const $card = $(this).closest(".card");
      const postId = $card.data("post-id");
      if (!postId || playback.postId !== postId) return;
      stopPlayback();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopPlayback();
      }
    });

    $(document).ready(loadPosts);
  </script>
</body>
</html>
